name: Build and Push Docker Image

on:
  push:
    branches:
      - main # Trigger the action on pushes to the main branch
  pull_request:
    branches:
      - main # Trigger on PRs to the main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Get version from Git tag
      id: get_version
      run: echo "VERSION=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV

    - name: Build Docker image
      run: |
        IMAGE_TAG=${GITHUB_SHA::8}
        docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/monolithic:latest -t ${{ secrets.DOCKER_USERNAME }}/monolithic:$IMAGE_TAG -t ${{ secrets.DOCKER_USERNAME }}/monolithic:$VERSION .
    
    - name: Push Docker image
      run: |
        echo "Pushing ${{ secrets.DOCKER_USERNAME }}/monolithic:latest"
        docker push ${{ secrets.DOCKER_USERNAME }}/monolithic:latest
        sleep 5
